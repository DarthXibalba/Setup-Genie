# =============================================================================
# Ansible configuration for Setup-Genie
# =============================================================================
# Picked up automatically when ansible/ansible-playbook is run from this dir.
# Always run Ansible commands from inside the ansible/ directory.
# =============================================================================
[defaults]
inventory            = inventory/hosts.yml
roles_path           = roles
collections_path     = ~/.ansible/collections:./collections
interpreter_python   = auto_silent
retry_files_enabled  = False
host_key_checking    = False
# Human-readable YAML task output (replaces the old logging.sh aesthetic):
result_format        = yaml
callbacks_enabled    = ansible.posix.profile_tasks
# Vault is introduced in Phase 4. Uncomment once vault.yml exists and the
# password file is created (the password file is gitignored — never commit it):
# vault_password_file = .vault_pass

[privilege_escalation]
# Escalate per-task with `become: true`, NOT globally — user-scoped tasks
# (ssh keys, dotfiles, git) must run as the login user. See the plan, pitfall #1.
become = False

[ssh_connection]
pipelining = True
