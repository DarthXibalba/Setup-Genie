---
# =============================================================================
# Inventory
# =============================================================================
# Two groups:
#   local        — this control node itself (used for testing / self-bootstrap)
#   workstations — the remote Ubuntu/WSL machines you provision over SSH
#
# The primary run model is control-node-over-SSH: add real hosts under
# `workstations` and run `ansible-playbook site.yml --limit workstations`.
# =============================================================================
all:
  children:
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

    workstations:
      hosts:
        # Replace with your real target(s). Example:
        # ubuntu-dev:
        #   ansible_host: 192.168.1.50
        #   ansible_user: youruser          # must have passwordless or known sudo
        {}
      vars:
        ansible_python_interpreter: /usr/bin/python3
